log_format json_combined escape=json '{"time":"$time_iso8601","method":"$request_method","uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,"ip":"$remote_addr"}';

server {
    listen 80;
    
    access_log /dev/stdout json_combined;


    location /go/ { 
        proxy_pass http://go-app:8080/; 
    }
    
    location /nodejs/ { 
        proxy_pass http://nodejs-app:8080/; 
    }
    
    location /python/ { 
        proxy_pass http://python-app:8080/; 
    }
}
